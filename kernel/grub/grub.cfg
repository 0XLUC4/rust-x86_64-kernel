set timeout=0
set default=0

# Fenêtre plus compacte prioritaire, avec fallback large.
insmod all_video
insmod gfxterm
set gfxmode=1280x720x32,1024x768x32,1366x768x32,1600x900x32,1920x1080x32,auto
set gfxpayload=keep
terminal_output gfxterm

menuentry "Rust Kernel" {
    multiboot2 /boot/kernel.bin
    boot
}
